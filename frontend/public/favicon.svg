<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="seaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sea waves background -->
  <rect width="32" height="32" fill="url(#seaGradient)" rx="6"/>
  
  <!-- Ship hull -->
  <path d="M8 20 L24 20 L22 24 L10 24 Z" fill="#ffffff" opacity="0.9"/>
  
  <!-- Ship cabin -->
  <rect x="12" y="16" width="8" height="4" fill="#ffffff" opacity="0.8" rx="1"/>
  
  <!-- Mast -->
  <line x1="16" y1="8" x2="16" y2="16" stroke="#ffffff" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Sail -->
  <path d="M16 8 L22 10 L22 14 L16 12 Z" fill="#ffffff" opacity="0.6"/>
  
  <!-- Waves -->
  <path d="M2 26 Q6 24 10 26 T18 26 T26 26 T30 26" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M0 28 Q4 26 8 28 T16 28 T24 28 T32 28" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.3"/>
</svg>