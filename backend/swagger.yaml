              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      tripId:
                        type: integer
                      canStart:
                        type: boolean
                        description: Whether trip can be started
                      status:
                        type: string
                      statusMessage:
                        type: string
                      allDocumentsApproved:
                        type: boolean
                      personalDocsComplete:
                        type: boolean
