  /trip/{id}/upload-document:
    post:
      tags: [Admin - Trip]
      summary: Upload trip permit document
      description: |
        **📄 UPLOAD DOKUMEN PERIZINAN TRIP**
        
        Upload salah satu dari 3 dokumen perizinan yang diperlukan untuk trip:
        - **Izin Melaut**: Surat izin berlayar dari otoritas pelabuhan
        - **Dokumen Kapal**: Dokumen kelengkapan kapal (SIUP, SIPI, dll)
        - **Asuransi**: Sertifikat asuransi kapal dan ABK
        
        **🔄 Auto Status Update:**
        Ketika semua 3 dokumen sudah diupload, status trip otomatis berubah dari `menunggu_dokumen` → `menunggu_izin`
        
        **🔐 Authorization:**
        - Nahkoda: Hanya bisa upload dokumen untuk trip sendiri
        - Admin: Bisa upload dokumen untuk semua trip
        
        **💡 Use Case:**
        Nahkoda upload 3 dokumen → Status otomatis jadi menunggu_izin → Admin review & approve
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Trip ID
          example: 1
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - dokumen
                - jenisDokumen
              properties:
                dokumen:
                  type: string
                  format: binary
                  description: |
                    **CLICK "Choose File" to upload**
                    File dokumen perizinan (PDF, JPG, PNG)
                    Max size: 10MB
                jenisDokumen:
                  type: string
                  enum:
                    - izinMelaut
                    - dokumenKapal
                    - asuransi
                  example: izinMelaut
                  description: |
                    Jenis dokumen yang diupload:
                    - **izinMelaut**: Izin Melaut
                    - **dokumenKapal**: Dokumen Kapal
                    - **asuransi**: Asuransi
                keterangan:
                  type: string
                  example: "Izin melaut berlaku sampai 31 Des 2026"
                  description: Catatan tambahan (opsional, max 200 karakter)
            examples:
              uploadIzinMelaut:
                summary: "📋 Upload Izin Melaut"
                value:
                  jenisDokumen: izinMelaut
                  keterangan: "Izin melaut berlaku sampai 31 Des 2026"
              uploadDokumenKapal:
                summary: "🚢 Upload Dokumen Kapal"
                value:
                  jenisDokumen: dokumenKapal
                  keterangan: "SIUP dan SIPI kapal terbaru"
              uploadAsuransi:
                summary: "🛡️ Upload Asuransi"
                value:
                  jenisDokumen: asuransi
                  keterangan: "Asuransi kapal dan ABK aktif"
      responses:
        '200':
          description: Document uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Dokumen izinMelaut berhasil diupload. Semua dokumen lengkap, menunggu persetujuan admin."
                  data:
                    type: object
                    properties:
                      tripId:
                        type: integer
                        example: 1
                      jenisDokumen:
                        type: string
                        example: "izinMelaut"
                      fileName:
                        type: string
                        example: "izinmelaut-1738640000000.pdf"
                      fileUrl:
                        type: string
                        example: "/uploads/trip-documents/1/izinmelaut-1738640000000.pdf"
                      fileSize:
                        type: integer
                        example: 524288
                        description: "File size in bytes"
                      uploadedAt:
                        type: string
                        format: date-time
                      keterangan:
                        type: string
                        example: "Izin melaut berlaku sampai 31 Des 2026"
                      tripStatus:
                        type: string
                        enum: [menunggu_dokumen, menunggu_izin]
                        example: "menunggu_izin"
                        description: "Trip status after upload"
                      allDocumentsComplete:
                        type: boolean
                        example: true
                        description: "True if all 3 documents uploaded"
                      documents:
                        type: object
                        properties:
                          izinMelaut:
                            type: boolean
                            example: true
                          dokumenKapal:
                            type: boolean
                            example: true
                          asuransi:
                            type: boolean
                            example: true
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Jenis dokumen tidak valid. Pilih: izinMelaut, dokumenKapal, atau asuransi"
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Anda tidak memiliki akses untuk mengupload dokumen trip ini"
        '404':
          description: Trip not found

  /trip/{id}/trip-documents:
    get:
      tags: [Admin - Trip]
      summary: Get trip documents
      description: |
        **📋 LIHAT SEMUA DOKUMEN TRIP**
        
        Mendapatkan daftar semua dokumen perizinan yang sudah diupload untuk trip tertentu.
        
        **📊 Response includes:**
        - Status upload setiap dokumen (uploaded/not uploaded)
        - File URL untuk download
        - Upload timestamp
        - Completion percentage
        
        **🔐 Authorization:**
        - Nahkoda: Hanya bisa lihat dokumen trip sendiri
        - ABK: Bisa lihat dokumen trip yang dia ikuti
        - Admin: Bisa lihat semua dokumen trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Trip ID
          example: 1
      responses:
        '200':
          description: Trip documents retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      tripId:
                        type: integer
                        example: 1
                      tripStatus:
                        type: string
                        example: "menunggu_izin"
                      vesselName:
                        type: string
                        example: "KM Mina Jaya"
                      nahkoda:
                        type: string
                        example: "Budi Santoso"
                      allDocumentsComplete:
                        type: boolean
                        example: true
                      documents:
                        type: array
                        items:
                          type: object
                          properties:
                            jenisDokumen:
                              type: string
                              example: "izinMelaut"
                            displayName:
                              type: string
                              example: "Izin Melaut"
                            isUploaded:
                              type: boolean
                              example: true
                            fileName:
                              type: string
                              nullable: true
                              example: "izinmelaut-1738640000000.pdf"
                            fileUrl:
                              type: string
                              nullable: true
                              example: "/uploads/trip-documents/1/izinmelaut-1738640000000.pdf"
                            fileSize:
                              type: integer
                              nullable: true
                              example: 524288
                            uploadedAt:
                              type: string
                              format: date-time
                              nullable: true
                            uploadedBy:
                              type: integer
                              nullable: true
                              example: 5
                            keterangan:
                              type: string
                              nullable: true
                              example: "Izin melaut berlaku sampai 31 Des 2026"
                      completionPercentage:
                        type: integer
                        example: 100
                        description: "Percentage of documents uploaded (0-100)"
        '403':
          description: Unauthorized
        '404':
          description: Trip not found

  /trip/{id}/trip-documents/{documentType}:
    delete:
      tags: [Admin - Trip]
      summary: Delete trip document
      description: |
        **🗑️ HAPUS DOKUMEN TRIP**
        
        Menghapus dokumen perizinan tertentu dari trip.
        
        **⚠️ Auto Status Revert:**
        Jika sebelumnya semua dokumen lengkap (status: menunggu_izin), setelah hapus dokumen status akan kembali ke `menunggu_dokumen`
        
        **🔐 Authorization:**
        - Nahkoda: Hanya bisa hapus dokumen trip sendiri
        - Admin: Bisa hapus dokumen semua trip
        
        **💡 Use Case:**
        Dokumen salah upload → Hapus → Upload ulang yang benar
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Trip ID
          example: 1
        - name: documentType
          in: path
          required: true
          schema:
            type: string
            enum:
              - izinMelaut
              - dokumenKapal
              - asuransi
          description: Jenis dokumen yang akan dihapus
          example: izinMelaut
      responses:
        '200':
          description: Document deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Dokumen izinMelaut berhasil dihapus"
                  data:
                    type: object
                    properties:
                      tripId:
                        type: integer
                        example: 1
                      documentType:
                        type: string
                        example: "izinMelaut"
                      tripStatus:
                        type: string
                        example: "menunggu_dokumen"
                        description: "Status after deletion (may revert to menunggu_dokumen)"
                      allDocumentsComplete:
                        type: boolean
                        example: false
        '400':
          description: Invalid document type
        '403':
          description: Unauthorized
        '404':
          description: Trip or document not found


  /admin/notifications:
