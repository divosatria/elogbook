  /mobile/vessels/assignment-status:
    get:
      tags: [Mobile - Vessel]
      summary: Check vessel assignment status
      description: |
        **🔍 CEK STATUS ASSIGNMENT USER**
        
        Endpoint ini untuk mengecek apakah user sudah di-assign ke kapal atau belum.
        
        **📋 Response berisi:**
        - Status assignment (assigned/unassigned)
        - Daftar kapal yang di-assign
        - Tipe assignment (captain/crew)
        
        **💡 Use Case:**
        - Cek status sebelum menampilkan UI
        - Validasi akses fitur tertentu
        - Dashboard summary
      responses:
        '200':
          description: Assignment status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      userId:
                        type: integer
                        example: 5
                      role:
                        type: string
                        enum: [nahkoda, abk]
                        example: "nahkoda"
                      assignmentType:
                        type: string
                        enum: [captain, crew]
                        example: "captain"
                        description: "User's assignment type"
                      hasAssignment:
                        type: boolean
                        example: true
                        description: "Whether user has vessel assignment"
                      assignedVessels:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            namaKapal:
                              type: string
                            nomorRegistrasi:
                              type: string
                            statusOperasional:
                              type: string
                            assignmentStatus:
                              type: string
                              enum: [assigned]
                              example: "assigned"
        '403':
          description: Only nahkoda and ABK can access
        '503':
          description: Database unavailable

  /mobile/vessels/{id}:
    get:
      tags: [Mobile - Vessel]
      summary: Get vessel detail
      description: |
        **📋 DETAIL INFORMASI KAPAL**
        
        Get complete vessel information by ID dengan akses control yang tepat.
        
        **👥 Authorization**: 
        - **Nahkoda**: Dapat akses kapal yang di-assign sebagai captain + lihat info crew
        - **ABK**: Dapat akses kapal dimana mereka di-assign sebagai crew (read-only)
        
        **📋 Response berbeda berdasarkan role:**
        - **Nahkoda**: Mendapat info lengkap + daftar crew members
        - **ABK**: Mendapat info kapal tanpa daftar crew
        
        **💡 Use Case:**
        1. User pilih kapal dari list
        2. Call endpoint ini untuk lihat detail lengkap
        3. Lihat dokumen, spesifikasi, GPS history
        4. Nahkoda bisa lihat crew yang di-assign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Vessel ID
          example: 1
      responses:
        '200':
          description: Vessel details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      vesselId:
                        type: string
                      namaKapal:
                        type: string
                      nomorRegistrasi:
                        type: string
                      nomorKapal:
                        type: string
                      pemilik:
                        type: string
                      tipeKapal:
                        type: string
                      alatTangkap:
                        type: string
                      panjangKapal:
                        type: number
                      lebarKapal:
                        type: number
                      spesifikasi:
                        type: object
                      statusOperasional:
                        type: string
                      statusPelayaran:
                        type: string
                      foto:
                        type: string
                        nullable: true
                      nahkoda:
                        type: object
                        properties:
                          id:
                            type: integer
                          nama:
                            type: string
                          username:
                            type: string
                          noTelepon:
                            type: string
                          email:
                            type: string
                      userAssignmentType:
                        type: string
                        enum: [captain, crew]
                        example: "captain"
                        description: "Current user's assignment type on this vessel"
                      crewMembers:
                        type: array
                        description: "Crew list (only visible to nahkoda)"
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            nama:
                              type: string
                            username:
                              type: string
                            noTelepon:
                              type: string
                            email:
                              type: string
                      gps:
                        type: object
                        nullable: true
                      lastPosition:
                        type: object
                        nullable: true
                      dokumen:
                        type: array
                        description: Vessel documents (SIUP, SIPI, etc)
                      mesin:
                        type: object
                        nullable: true
                        properties:
                          merk:
                            type: string
                          daya:
                            type: string
                          tahunPembuatan:
                            type: integer
                      storageData:
                        type: object
                        nullable: true
                      dataBahanBakar:
                        type: object
                        nullable: true
                      sertifikatJalan:
                        type: object
                        nullable: true
                      asuransi:
                        type: object
                        nullable: true
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Anda tidak memiliki akses ke kapal ini"
        '404':
          description: Vessel not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Kapal tidak ditemukan"

  /mobile/my-schedules:
    get:
      tags: [Mobile - Trip]
      summary: Get my operational task schedules
      description: |
        **📅 JADWAL TUGAS OPERASIONAL SAYA**
        
        Endpoint untuk nahkoda & ABK melihat jadwal tugas operasional yang ditugaskan.
        
        **🔄 Perbedaan dengan /my-trips:**
        - **my-schedules**: Jadwal tugas yang dibuat admin (belum jadi trip)
        - **my-trips**: Trip resmi yang sudah masuk perizinan (dari jadwal atau manual)
        
        **👥 Authorization:**
        - **Nahkoda**: Jadwal dimana mereka assigned sebagai nahkoda
        - **ABK**: Jadwal dimana mereka assigned sebagai crew
        
        **📊 Response berisi:**
        - Daftar jadwal tugas dengan detail lengkap
        - Info kapal, zonasi tangkap, dan crew
        - Tanggal & waktu jadwal
