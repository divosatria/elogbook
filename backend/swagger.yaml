  /mobile/location:
    post:
      tags: [Mobile - Location]
      summary: Update vessel location
      description: |
        **📍 UPDATE LOKASI KAPAL DARI MOBILE**
        
        Endpoint untuk nahkoda/ABK mengirim update lokasi GPS kapal secara real-time.
        
        **📊 Data yang Disimpan:**
        - Koordinat GPS presisi (latitude, longitude)
        - Timestamp update lokasi
        - User yang mengirim update (nahkoda/ABK)
        - Device ID GPS (jika ada)
        
        **🔄 Integration:**
        - Update langsung ke database kapal
        - Real-time update ke live monitoring dashboard
        - History tracking untuk analisis rute
        - WebSocket notification ke admin
        
        **💡 Use Case:**
        Mobile app → Auto GPS tracking → Kirim koordinat → Update database → Admin lihat di map
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kapalId, lat, lng]
              properties:
                kapalId:
                  type: integer
                  example: 1
                  description: ID kapal yang akan diupdate lokasinya
                lat:
                  type: number
                  format: float
                  example: -6.1234
                  description: GPS latitude coordinate
                lng:
                  type: number
                  format: float
                  example: 106.5678
                  description: GPS longitude coordinate
                deviceId:
                  type: string
                  example: "GPS-001"
                  description: GPS device ID (opsional)
      responses:
        '200':
          description: Location updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Lokasi berhasil diupdate"
        '400':
          description: Invalid coordinates
        '403':
          description: User not authorized for this vessel
        '404':
          description: Vessel not found

  /mobile/personal-documents:
    post:
      tags: [Mobile - Documents]
      summary: Upload personal documents (alternative endpoint)
      description: |
        **📤 UPLOAD DOKUMEN PRIBADI (ALTERNATIVE)**
        
        Alternative endpoint untuk upload dokumen pribadi nahkoda/ABK.
        
        **📋 Jenis Dokumen:**
        - KTP, Buku Pelaut, Sertifikat Nahkoda/Keahlian
        - BST, STCW, Surat Keterangan Sehat
        
        **💾 Penyimpanan:**
        - File disimpan di `/uploads/documents/`
        - Status awal: `pending` (menunggu approval admin)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, jenisDokumen, nomorDokumen]
              properties:
                file:
                  type: string
                  format: binary
                  description: Document file (PDF, JPG, PNG - max 10MB)
                jenisDokumen:
                  type: string
                  enum: [KTP, Buku Pelaut, Sertifikat Nahkoda, Sertifikat Keahlian, BST, STCW]
                  example: "KTP"
                nomorDokumen:
                  type: string
                  example: "1234567890123456"
                  description: Document number (required)
                tanggalBerlaku:
                  type: string
                  format: date
                  example: "2030-12-31"
                  description: Expiry date (optional for some documents)
      responses:
        '200':
          description: Document uploaded successfully
        '400':
          description: Validation error
        '403':
          description: Only nahkoda and ABK can upload personal documents

