        **🔄 KONVERSI JADWAL TUGAS → PERIZINAN TRIP**
        
        Mengkonversi jadwal tugas operasional menjadi trip yang masuk ke sistem perizinan.
        
        **📋 Syarat Konversi:**
        - Task harus bertipe `departure` atau `fishing`
        - Task belum selesai (status bukan `completed`)
        - Task harus memiliki vessel dan jadwal yang valid
        
        **🔄 Proses Konversi:**
        1. Validasi task dapat dikonversi
        2. Buat trip baru dengan data dari task
        3. Set status trip = `menunggu_izin`
        4. Mark task sebagai `completed`
        5. Link trip ke task asli (taskId)
        
        **📊 Data yang Dipindahkan:**
        - Vessel ID → kapalId
        - Nahkoda ID → nahkodaId  
        - Scheduled Date/Time → tanggalBerangkat
        - Catch Polygon → areaTangkap
        - Location Notes → areaTangkap.nama
        
        **💡 Use Case:**
        Admin buat jadwal tugas → Task siap → Konversi ke trip → Masuk perizinan → Nahkoda upload dokumen → Admin approve → Trip dimulai
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Operational task ID to convert
          example: 1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                estimasiPulang:
                  type: string
                  format: date-time
                  example: "2025-01-27T18:00:00Z"
                  description: Estimated return date (optional, defaults to 7 days from departure)
                targetIkan:
                  type: string
                  example: "Tuna"
                  description: Target fish species (optional, defaults to "Ikan Campuran")
                areaTangkap:
                  type: object
                  description: Fishing area details (optional, uses task's catch polygon if available)
                  properties:
                    nama:
                      type: string
                      example: "WPP 711 - Laut Jawa"
                    zona:
                      type: string
                      example: "fishing"
                    coordinates:
                      type: object
                      properties:
                        lat:
                          type: number
                        lng:
                          type: number
      responses:
        '201':
          description: Task successfully converted to trip
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Tugas berhasil dikonversi ke trip dan masuk ke perizinan"
                  data:
                    type: object
                    properties:
                      task:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          title:
                            type: string
                            example: "Persiapan Keberangkatan"
                          status:
                            type: string
                            example: "completed"
                      trip:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 15
                          kapal:
                            type: string
                            example: "KM Mina Jaya"
                          nahkoda:
                            type: string
                            example: "Kapten Ahmad"
                          tanggalBerangkat:
                            type: string
                            format: date-time
                            example: "2025-01-20T06:00:00Z"
                          estimasiPulang:
                            type: string
                            format: date-time
                            example: "2025-01-27T18:00:00Z"
                          status:
                            type: string
                            example: "menunggu_izin"
                          areaTangkap:
                            type: object
                            properties:
                              nama:
                                type: string
                              zona:
                                type: string
                              coordinates:
                                type: object
        '400':
          description: Task cannot be converted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    examples:
                      wrongType:
                        value: "Hanya tugas tipe 'departure' atau 'fishing' yang bisa dikonversi ke trip"
                      alreadyCompleted:
                        value: "Tugas yang sudah selesai tidak bisa dikonversi ke trip"
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Tugas tidak ditemukan"
        '500':
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Gagal mengkonversi tugas ke trip"

  /trip:
    get:
      tags: [Trips]
      summary: Get all trips
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: kapalId
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trip'

    post:
      tags: [Trips]
      summary: Create new trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kapalId, nahkodaId, tanggalBerangkat, estimasiPulang]
              properties:
                kapalId:
                  type: integer
                nahkodaId:
                  type: integer
                tanggalBerangkat:
                  type: string
                  format: date-time
                estimasiPulang:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Trip created

  /users:
    get:
      tags: [Users]
      summary: Get all users
      parameters:
        - name: role
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'

    post:
      tags: [Users]
      summary: Create new user with photo
      description: Admin can create users for web or mobile access with profile photo
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [username, email, password, nama, role]
              properties:
                foto:
                  type: string
                  format: binary
                  description: Profile photo (JPG, PNG - max 5MB)
                username:
                  type: string
                  example: "johndoe"
                email:
                  type: string
                  example: "john@example.com"
                password:
                  type: string
                  example: "password123"
                nama:
                  type: string
                  example: "John Doe"
                role:
                  type: string
                  enum: [admin, nahkoda, abk, operator]
                  example: "nahkoda"
                noTelepon:
                  type: string
                  example: "081234567890"
                alamat:
                  type: string
                  example: "Jl. Pelabuhan No. 123"
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      username:
                        type: string
                      email:
                        type: string
                      nama:
                        type: string
                      role:
                        type: string
                      noTelepon:
                        type: string
                      alamat:
                        type: string
                      foto:
                        type: string
                      fotoUrl:
                        type: string
                        example: "/uploads/profile-photos/1-1234567890.jpg"
                      isActive:
                        type: boolean
        '400':
          description: Validation error or duplicate username/email

