      summary: Submit trip task completion
      description: |
        **✅ SUBMIT PENYELESAIAN TUGAS TRIP**
        
        Endpoint untuk nahkoda/ABK melaporkan penyelesaian tugas trip.
        
        **📋 Data yang Dikirim:**
        - Task ID yang diselesaikan
        - Catatan penyelesaian
        - Foto bukti (opsional)
        - Status completion
        
        **🔄 Workflow:**
        User selesai tugas → Submit completion → Admin review → Task marked complete
      requestBody:
        required: true
