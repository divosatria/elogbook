                  description: Judul notifikasi
                message:
                  type: string
                  example: "Your trip has been approved and ready to start"
                  description: Isi pesan notifikasi
                recipients:
                  type: array
                  items:
                    type: integer
                  example: [5, 8, 10]
                  description: Array user IDs yang akan menerima notifikasi
                type:
