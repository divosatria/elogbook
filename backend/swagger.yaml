  /mobile/vessel/{kapalId}/fuel-data:
    post:
      tags: [Mobile - Vessel]
      summary: Upload fuel data
      description: |
        **⛽ UPLOAD DATA BAHAN BAKAR**
        
        Nahkoda/ABK upload data pengisian bahan bakar dengan bukti struk.
        
        **📊 Data yang Disimpan:**
        - Jenis bahan bakar (Solar, Bensin, Pertamax)
        - Jumlah liter dan harga
        - Tanggal & lokasi pengisian
        - Bukti struk (foto/PDF - opsional)
        
        **💾 Penyimpanan:**
        - Data disimpan di kolom `dataBahanBakar` (JSON array)
        - File bukti disimpan di `/uploads/documents/`
      parameters:
        - name: kapalId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [jenisBahanBakar, jumlahLiter, hargaPerLiter, totalHarga, tanggalPengisian]
              properties:
                bukti:
                  type: string
                  format: binary
                  description: Receipt photo (optional - JPG, PNG, PDF - max 10MB)
                jenisBahanBakar:
                  type: string
                  enum: [Solar, Bensin, Pertamax]
                  example: "Solar"
                jumlahLiter:
                  type: number
                  format: float
                  example: 500
                hargaPerLiter:
                  type: number
                  format: float
                  example: 6500
                totalHarga:
                  type: number
                  format: float
                  example: 3250000
                tanggalPengisian:
                  type: string
                  format: date-time
                  example: "2024-01-15T08:00:00Z"
                lokasiPengisian:
                  type: string
                  example: "SPBU Pelabuhan Muara Baru"
      responses:
        '200':
          description: Fuel data uploaded successfully
        '400':
          description: Validation error
        '403':
          description: Access denied
        '404':
          description: Vessel not found

  /mobile/vessel/{kapalId}/fuel-summary:
    get:
      tags: [Mobile - Vessel]
      summary: Get fuel consumption summary
      description: |
        **📊 RINGKASAN KONSUMSI BAHAN BAKAR**
        
        Mendapatkan statistik dan ringkasan konsumsi bahan bakar kapal.
        
        **📊 Data Summary:**
        - Total pengisian dan liter
        - Total biaya dan rata-rata harga
        - Pengisian terakhir
        - Detail semua pengisian (tanpa file path)
        
        **📅 Filter Tanggal:**
        - Gunakan query parameter `startDate` dan `endDate`
        - Format: YYYY-MM-DD
        - Jika tidak ada filter, tampilkan semua data
        
        **📊 Use Case:**
        - Dashboard fuel consumption
        - Laporan bulanan/tahunan
        - Analisis efisiensi bahan bakar
        - Budget planning
      parameters:
        - name: kapalId
          in: path
          required: true
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: Filter start date (optional)
          example: "2024-01-01"
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: Filter end date (optional)
          example: "2024-12-31"
      responses:
        '200':
          description: Fuel summary retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      kapal:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          namaKapal:
                            type: string
                            example: "KM Mina Jaya"
                      summary:
                        type: object
                        properties:
                          totalPengisian:
                            type: integer
                            example: 12
                            description: "Total number of fuel refills"
                          totalLiter:
                            type: number
                            example: 6500.5
                            description: "Total liters purchased"
                          totalBiaya:
                            type: number
                            example: 42250000
                            description: "Total cost spent"
                          rataRataHarga:
                            type: number
                            example: 6500
                            description: "Average price per liter"
                          pengisianTerakhir:
                            type: object
                            nullable: true
                            description: "Last fuel refill data (without sensitive paths)"
                            properties:
                              id:
                                type: string
                              jenisBahanBakar:
                                type: string
                              jumlahLiter:
                                type: number
                              hargaPerLiter:
                                type: number
                              totalHarga:
                                type: number
                              tanggalPengisian:
                                type: string
                                format: date-time
                              lokasiPengisian:
                                type: string
                              buktiFileUrl:
                                type: string
                                nullable: true
                              uploadedAt:
                                type: string
                                format: date-time
                      details:
                        type: array
                        description: "All fuel records (without file paths)"
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            jenisBahanBakar:
                              type: string
                            jumlahLiter:
                              type: number
                            hargaPerLiter:
                              type: number
                            totalHarga:
                              type: number
                            tanggalPengisian:
                              type: string
                              format: date-time
                            lokasiPengisian:
                              type: string
                            buktiFileUrl:
                              type: string
                              nullable: true
                            uploadedAt:
                              type: string
                              format: date-time
        '400':
          description: Invalid date range
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Format tanggal tidak valid"
        '404':
          description: Vessel not found

