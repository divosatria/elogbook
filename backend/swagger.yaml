        - Semua dokumen kapal uploaded & approved
        - Data operasional lengkap (BBM, Es)
        
        **💡 Use Case:**
        Nahkoda → Dashboard → Lihat trip → Cek tombol mulai → Jika aktif: bisa mulai trip
