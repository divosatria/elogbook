  /admin/vessel/{kapalId}/documents/{documentId}/reject:
    patch:
      tags: [Admin - Vessel Documents]
      summary: Reject vessel document
      description: |
        **❌ REJECT DOKUMEN KAPAL**
        
        Admin menolak dokumen kapal dengan alasan.
        Status berubah dari 'pending' ke 'rejected'.
      parameters:
        - name: kapalId
          in: path
