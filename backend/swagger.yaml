        **⛽ UPLOAD DATA BAHAN BAKAR - Kesiapan Operasional**
        
        Endpoint khusus **ABK** untuk upload data pengisian bahan bakar beserta bukti foto/dokumen.
        Data disimpan di `trip.perizinan.operasional` dan `trip.perizinan.fuelData`.
        
