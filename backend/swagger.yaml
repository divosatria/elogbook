  /mobile/vessel/my-vessel:
    get:
      tags: [Mobile - Vessel]
      summary: Get my assigned vessels
      description: |
        **📱 ALUR INFORMASI KAPAL DI MOBILE APP**
        
        **🔄 Workflow:**
        1. **Admin di website** input data kapal + assign nahkoda & ABK
        2. **User mobile** (nahkoda/ABK yang sudah di-assign) login ke app
        3. **Call endpoint ini** untuk melihat kapal yang sudah di-assign
        4. **User bisa lihat** informasi lengkap kapal mereka
        
        **👥 Authorization:**
        - **Nahkoda**: Melihat semua kapal yang di-assign sebagai captain
        - **ABK**: Melihat semua kapal dimana mereka di-assign sebagai crew
        
        **📋 Response berisi:**
        - Data kapal lengkap (nama, registrasi, spesifikasi)
        - Status assignment (captain/crew)
        - Informasi nahkoda dan crew
        - GPS dan lokasi terakhir
        - Dokumen kapal
        - Data storage dan bahan bakar
        
        **💡 Use Case:**
        - User login → call endpoint ini → lihat kapal assigned → pilih kapal → mulai trip
      responses:
        '200':
          description: List of assigned vessels
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        vesselId:
                          type: string
                          example: "VSL-001"
                        namaKapal:
                          type: string
                          example: "KM Mina Jaya"
                        nomorRegistrasi:
                          type: string
                          example: "123-ABC-2024"
                        nomorKapal:
                          type: string
                          example: "KM-001"
                        pemilik:
                          type: string
                          example: "PT Mina Jaya"
                        tipeKapal:
                          type: string
                          enum: [penangkap_ikan, pengangkut_ikan, penelitian, patroli]
                          example: "penangkap_ikan"
                        alatTangkap:
                          type: string
                          example: "Purse Seine"
                        panjangKapal:
                          type: number
                          format: float
                          example: 25.5
                        lebarKapal:
                          type: number
                          format: float
                          example: 6.2
                        spesifikasi:
                          type: object
                          example: {"kapasitas": 10, "material": "Kayu"}
                        statusOperasional:
                          type: string
                          enum: [active, maintenance, inactive]
                          example: "active"
                        statusPelayaran:
                          type: string
                          enum: [sailing, docked, maintenance, idle]
                          example: "docked"
                        foto:
                          type: string
                          nullable: true
                        nahkoda:
                          type: object
                          properties:
                            id:
                              type: integer
                            nama:
                              type: string
                            username:
                              type: string
                            noTelepon:
                              type: string
                        assignmentStatus:
                          type: string
                          enum: [captain, crew]
                          example: "captain"
                          description: "User's role on this vessel"
                        gps:
                          type: object
                          nullable: true
                          properties:
                            currentPosition:
                              type: object
                              properties:
                                latitude:
                                  type: number
                                longitude:
                                  type: number
                                timestamp:
                                  type: string
                                  format: date-time
                            isActive:
                              type: boolean
                            lastUpdate:
                              type: string
                              format: date-time
                        lastPosition:
                          type: object
                          nullable: true
                          properties:
                            latitude:
                              type: number
                            longitude:
                              type: number
                        dokumen:
                          type: array
                          items:
                            type: object
                            properties:
                              jenis:
                                type: string
                              nomor:
                                type: string
                              berlakuHingga:
                                type: string
                                format: date
                              fileUrl:
                                type: string
                        storageData:
                          type: object
                          nullable: true
                          properties:
                            kapasitasEs:
                              type: number
                            kapasitasIkan:
                              type: number
                        dataBahanBakar:
                          type: object
                          nullable: true
                          properties:
                            kapasitas:
                              type: number
                            jenis:
                              type: string
                  message:
                    type: string
                    example: "Belum ada kapal yang ditugaskan"
                    description: "Message when no vessels assigned"
        '403':
          description: Only nahkoda and ABK can access
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Hanya nahkoda dan ABK yang bisa melihat kapal yang ditugaskan"
        '503':
          description: Database unavailable

  /mobile/vessel/{kapalId}/bahan-bakar:
    post:
      tags: [Mobile - Vessel]
      summary: Upload fuel data
      description: |
        **⛽ UPLOAD DATA BAHAN BAKAR**
        
        Upload data pengisian bahan bakar kapal dengan bukti struk (opsional).
        
        **📊 Data yang Disimpan:**
        - Jenis bahan bakar (Solar, Bensin, Premium, Pertamax)
        - Jumlah liter dan harga
        - Tanggal & lokasi pengisian
        - Bukti struk (foto/PDF - opsional)
        - Keterangan tambahan
        
        **💾 Penyimpanan:**
        - Data disimpan di kolom `dataBahanBakar` (JSON array) tabel `kapals`
        - File bukti disimpan di `/uploads/bahan-bakar/{kapalId}/`
        - Setiap record memiliki ID unik untuk tracking
      parameters:
        - name: kapalId
          in: path
          required: true
          schema:
            type: integer
          description: Vessel ID
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [jenisBahanBakar, jumlahLiter, hargaPerLiter, totalHarga, tanggalPengisian]
              properties:
                bukti:
                  type: string
                  format: binary
                  description: Receipt photo (optional - JPG, PNG, PDF - max 10MB)
                jenisBahanBakar:
                  type: string
                  enum: [Solar, Bensin, Premium, Pertamax]
                  example: "Solar"
                jumlahLiter:
                  type: number
                  format: float
                  example: 500
                  minimum: 0.1
                  maximum: 100000
                hargaPerLiter:
                  type: number
                  format: float
                  example: 6500
                  minimum: 0
                totalHarga:
                  type: number
                  format: float
                  example: 3250000
                  minimum: 0
                tanggalPengisian:
                  type: string
                  format: date-time
                  example: "2024-01-15T08:00:00Z"
                  description: Refill date (cannot be future, max 1 year ago)
                lokasiPengisian:
                  type: string
                  example: "SPBU Pelabuhan Muara Baru"
                  maxLength: 200
                keterangan:
                  type: string
                  example: "Pengisian rutin sebelum melaut"
                  maxLength: 500
      responses:
        '200':
          description: Fuel data uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Data bahan bakar berhasil diupload"
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "1768797500000"
                        description: "Unique fuel record ID"
                      jenisBahanBakar:
                        type: string
                        example: "Solar"
                      jumlahLiter:
                        type: number
                        example: 500
                      hargaPerLiter:
                        type: number
                        example: 6500
                      totalHarga:
                        type: number
                        example: 3250000
                      tanggalPengisian:
                        type: string
                        format: date-time
                      lokasiPengisian:
                        type: string
                        example: "SPBU Pelabuhan Muara Baru"
                      buktiFileUrl:
                        type: string
                        example: "http://localhost:5000/uploads/bahan-bakar/1/receipt_123.jpg"
                        nullable: true
                      uploadedAt:
                        type: string
                        format: date-time
        '400':
          description: Validation error
        '404':
          description: Vessel not found

  /mobile/vessel/{kapalId}/bahan-bakar/{fuelId}:
    put:
      tags: [Mobile - Vessel]
      summary: Update fuel data
      description: |
        **✏️ UPDATE DATA BAHAN BAKAR**
        
        Update data pengisian bahan bakar yang sudah ada.
        
        **🔄 Fitur Update:**
        - Update semua field data bahan bakar
        - Ganti bukti struk (file lama akan dihapus)
        - Tracking waktu update dan user
        - Validasi data sama seperti create
        
        **⚠️ Catatan:**
        - Jika upload file baru, file lama akan dihapus otomatis
        - Jika tidak upload file, file lama tetap dipertahankan
        - ID fuel record tidak berubah
      parameters:
        - name: kapalId
          in: path
          required: true
          schema:
            type: integer
          description: Vessel ID
        - name: fuelId
          in: path
          required: true
          schema:
            type: string
          description: Fuel record ID
          example: "1768797500000"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [jenisBahanBakar, jumlahLiter, hargaPerLiter, totalHarga, tanggalPengisian]
              properties:
                bukti:
                  type: string
                  format: binary
                  description: New receipt photo (optional - will replace old file)
                jenisBahanBakar:
                  type: string
                  enum: [Solar, Bensin, Premium, Pertamax]
                  example: "Solar"
                jumlahLiter:
                  type: number
                  format: float
                  example: 600
                hargaPerLiter:
                  type: number
                  format: float
                  example: 6800
                totalHarga:
                  type: number
                  format: float
                  example: 4080000
                tanggalPengisian:
                  type: string
                  format: date-time
                  example: "2024-01-15T08:00:00Z"
                lokasiPengisian:
                  type: string
                  example: "SPBU Pelabuhan Tanjung Priok"
                keterangan:
                  type: string
                  example: "Update: Pengisian tambahan"
      responses:
        '200':
          description: Fuel data updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Data bahan bakar berhasil diperbarui"
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "1768797500000"
                      jenisBahanBakar:
                        type: string
                      jumlahLiter:
                        type: number
                      totalHarga:
                        type: number
                      updatedAt:
                        type: string
                        format: date-time
                        description: "Timestamp when record was updated"
                      updatedBy:
                        type: integer
                        description: "User ID who updated the record"
        '400':
          description: Validation error
        '404':
          description: Vessel or fuel record not found

    delete:
      tags: [Mobile - Vessel]
      summary: Delete fuel data
      description: |
        **🗑️ DELETE DATA BAHAN BAKAR**
        
        Hapus data pengisian bahan bakar beserta file bukti.
        
        **🔄 Proses Delete:**
        1. Cari fuel record berdasarkan ID
        2. Hapus file bukti dari storage (jika ada)
        3. Remove record dari JSON array
        4. Update database
        
        **⚠️ Peringatan:**
        - Data yang dihapus tidak bisa dikembalikan
        - File bukti akan dihapus permanen dari server
        - Pastikan ID fuel record benar
      parameters:
        - name: kapalId
          in: path
          required: true
          schema:
            type: integer
          description: Vessel ID
        - name: fuelId
          in: path
          required: true
          schema:
            type: string
          description: Fuel record ID to delete
          example: "1768797500000"
      responses:
        '200':
          description: Fuel data deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Data bahan bakar berhasil dihapus"
        '404':
          description: Vessel or fuel record not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    examples:
                      vesselNotFound:
                        value: "Kapal tidak ditemukan"
                      fuelNotFound:
                        value: "Data bahan bakar tidak ditemukan"
        '500':
          description: Server error

