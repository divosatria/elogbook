                  description: Fuel quantity in liters
                hargaPerLiter:
                  type: number
                  format: float
                  example: 6500
                  description: Price per liter
                totalHarga:
                  type: number
                  format: float
                  example: 3250000
                  description: Total price
                tanggalPengisian:
                  type: string
                  format: date-time
                  example: "2024-01-15T08:00:00Z"
                  description: Refuel date
                lokasiPengisian:
                  type: string
                  example: "SPBU Pelabuhan Muara Baru"
