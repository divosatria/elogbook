  /edge/sync:
    post:
      tags: [Edge Computing]
      summary: Bulk sync data dari perangkat LoRa / Edge IoT
      description: Endpoint ini dilindungi oleh Static API Key (EDGE_API_KEY) yang dikirim lewat header Authorization Bearer, bukan JWT biasa.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  type: string
                  example: "lora_edge"
                timestamp:
                  type: string
                  format: date-time
                  example: "2025-01-15T10:30:00.000Z"
                count:
                  type: integer
                  example: 1
                packets:
                  type: array
                  items:
                    type: object
                    properties:
                      uuid:
                        type: string
                      raw_data:
                        type: string
                      parsed_data:
                        type: string
                      rssi:
                        type: number
                      snr:
                        type: number
                      packet_type:
                        type: string
                      received_at:
                        type: string
                        format: date-time
                      lat:
                        type: number
                      lng:
                        type: number
                      suhu_air:
                        type: number
                      suhu_kelembaban:
                        type: number
                      berat:
                        type: number
                      interval:
                        type: number
                      trail:
                        type: string
      responses:
        '201':
          description: Data successfully synced
        '400':
          description: Bad Request (Invalid payload)
        '401':
          description: Unauthorized (Invalid API Key)
        '500':
          description: Server error

  /edge/raw-data:
    get:
      tags: [Edge Computing]
      summary: Mengambil daftar Raw Data dari Edge / IoT (Dashboard Admin)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Halaman data
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
          description: Jumlah data per halaman
      responses:
        '200':
          description: Berhasil mengambil data
        '401':
          description: Unauthorized (Token JWT tidak valid)
        '500':
          description: Server error
