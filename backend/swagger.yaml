        '200':
          description: Data bahan bakar berhasil diupload
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      tripId:
                        type: integer
                      kapal:
                        type: object
                      fuelData:
                        type: object
                      operasional:
                        type: object
        '400':
          description: Data tidak lengkap
        '403':
          description: Hanya ABK yang bisa mengupload
        '404':
          description: Trip tidak ditemukan

