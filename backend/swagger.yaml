  /fishing-points:
    get:
      tags: [Fishing Points]
      summary: Get semua titik jaring
      description: |
        **🎣 GET SEMUA TITIK PENURUNAN/PENGANGKATAN JARING**

        Mendapatkan daftar titik jaring yang dicatat dari mobile app.
        Digunakan oleh web dashboard untuk monitoring.

        **🔍 Filter tersedia:**
        - `tripId` — filter berdasarkan ID trip
        - `kapalId` — filter berdasarkan ID kapal
        - `limit` — jumlah data (default: 100)

        **📍 Format koordinat:** `{ lat, lng }`
      parameters:
        - name: tripId
          in: query
          schema:
            type: integer
          description: Filter berdasarkan ID trip
          example: 39
        - name: kapalId
          in: query
          schema:
            type: integer
          description: Filter berdasarkan ID kapal
          example: 2
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
          description: Jumlah data yang dikembalikan
          example: 50
      responses:
        '200':
          description: Daftar titik jaring berhasil diambil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FishingPoint'
        '401':
          description: Token tidak valid
        '500':
          description: Server error

    post:
      tags: [Fishing Points]
      summary: Submit titik jaring (Mobile)
      description: |
        **🎣 SUBMIT TITIK PENURUNAN/PENGANGKATAN JARING**

        Endpoint untuk nahkoda/ABK mencatat titik koordinat saat menurunkan
        atau mengangkat jaring dari mobile app.

        **📱 Workflow Mobile:**
        1. Nahkoda/ABK tiba di lokasi penangkapan
        2. Tekan tombol "Turunkan Jaring" di app
        3. App ambil GPS otomatis + input kedalaman
        4. Data terkirim ke server
        5. Marker 🎣 muncul real-time di monitoring dashboard

        **🔒 Authorization:** Hanya nahkoda/ABK yang sedang dalam trip aktif

        **📡 Real-time:** Data langsung di-broadcast via Socket.io ke monitoring dashboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tripId, lat, lng]
              properties:
                tripId:
                  type: integer
                  example: 39
                  description: ID trip yang sedang berlangsung
                lat:
                  type: number
                  format: float
                  example: -6.99429
                  description: Koordinat latitude GPS
                lng:
                  type: number
                  format: float
                  example: 106.52455
                  description: Koordinat longitude GPS
                depthMeters:
                  type: number
                  format: float
                  example: 140
                  description: Kedalaman laut dalam meter (opsional)
                actionType:
                  type: string
                  enum: [net_deployed, net_retrieved]
                  default: net_deployed
                  example: net_deployed
                  description: |
                    Jenis aksi:
                    - `net_deployed` 🎣 — Jaring diturunkan
                    - `net_retrieved` ⬆️ — Jaring diangkat
                notes:
                  type: string
                  example: "Penurunan jaring di area ikan tuna"
                  description: Catatan tambahan (opsional)
            examples:
              turunkanJaring:
                summary: "🎣 Penurunan jaring"
                value:
                  tripId: 39
                  lat: -6.99429
                  lng: 106.52455
                  depthMeters: 140
                  actionType: net_deployed
                  notes: "Penurunan jaring titik 1"
              angkatJaring:
                summary: "⬆️ Pengangkatan jaring"
                value:
                  tripId: 39
                  lat: -7.00706
                  lng: 106.51372
                  depthMeters: 185
                  actionType: net_retrieved
                  notes: "Pengangkatan jaring setelah 6 jam"
      responses:
        '201':
          description: Titik jaring berhasil disimpan
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Titik jaring berhasil disimpan"
                  data:
                    $ref: '#/components/schemas/FishingPoint'
        '400':
          description: Data tidak lengkap
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                success: false
                message: "tripId, lat, lng wajib diisi"
        '404':
          description: Trip tidak ditemukan atau bukan milik Anda
        '401':
          description: Token tidak valid
        '500':
          description: Server error

