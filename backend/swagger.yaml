  /mobile/emergency-alert:
    post:
      tags: [Mobile - Emergency]
      summary: Send emergency alert with trip info
      description: |
        **🚨 KIRIM ALERT DARURAT DENGAN INFO TRIP**
        
        Endpoint untuk mengirim alert darurat dengan informasi trip dan lokasi.
        
        **📋 Data yang Diperlukan:**
        - Trip ID yang sedang berlangsung
        - Koordinat GPS lokasi darurat
        - Pesan darurat dan jenis emergency
        
        **🔄 Workflow:**
        1. User dalam trip mengalami darurat
        2. Kirim alert dengan koordinat GPS
        3. System update status trip ke 'darurat'
        4. Notifikasi real-time ke admin dashboard
        5. Admin koordinasi bantuan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tripId, location, message]
              properties:
                tripId:
                  type: integer
                  example: 1
                  description: ID trip yang sedang berlangsung
                location:
                  type: object
                  required: [lat, lng]
                  properties:
                    lat:
                      type: number
                      format: float
                      example: -6.1234
                      description: GPS latitude coordinate
                    lng:
                      type: number
                      format: float
                      example: 106.5678
                      description: GPS longitude coordinate
                  description: Koordinat GPS lokasi darurat
                message:
                  type: string
                  example: "Engine failure, need assistance"
                  description: Pesan darurat dari user
                emergencyType:
                  type: string
                  enum: ["SOS", "Medical Emergency", "Engine Failure", "Fire", "Collision", "Man Overboard", "Other"]
                  example: "Engine Failure"
                  description: Jenis emergency (opsional, default: SOS)
      responses:
        '200':
          description: Emergency alert sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Emergency alert sent successfully"
                  data:
                    type: object
                    properties:
                      tripId:
                        type: integer
                      emergencyType:
                        type: string
                      nahkoda:
                        type: string
                        description: Nama nahkoda trip
                      notificationResults:
                        type: object
                        description: Hasil pengiriman notifikasi
        '400':
          description: Invalid data or validation error
        '403':
          description: User not authorized for this trip
        '404':
          description: Trip not found

  /mobile/sos:
    post:
      tags: [Mobile - Emergency]
      summary: "🚨 Send SOS emergency alert from mobile"
      description: |
        **🚨 KIRIM SOS DARURAT DARI MOBILE APP**
        
        Endpoint untuk nahkoda/ABK mengirim sinyal darurat SOS dari mobile app.
        
        **📱 Workflow SOS dari Mobile:**
        1. **User** (nahkoda/ABK) tekan tombol SOS di mobile app
        2. **App** ambil GPS coordinates otomatis
        3. **Kirim** ke endpoint ini dengan data kapal dan lokasi
        4. **Server** simpan SOS alert ke database
        5. **Real-time notification** ke admin dashboard
        6. **Admin** lihat SOS di live monitoring map
        
        **🔄 Integration dengan Live Monitoring:**
        - SOS langsung muncul di `/admin/live-monitoring` sebagai marker merah
        - WebSocket notification ke semua admin yang online
        - Email/SMS alert ke emergency contacts (jika dikonfigurasi)
        
        **📊 Data yang Disimpan:**
        - Vessel ID dan info kapal
        - GPS coordinates presisi
        - Timestamp SOS dikirim
        - User yang mengirim (nahkoda/ABK)
        - Jenis emergency dan deskripsi
        - Status: aktif (baru dikirim)
        
        **💡 Use Case:**
        Kapal bermasalah → Nahkoda tekan SOS → Koordinat terkirim → Admin lihat di map → Koordinasi bantuan → Resolve SOS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kapalId, location]
              properties:
                kapalId:
                  type: integer
                  example: 1
                  description: "ID kapal yang mengirim SOS (wajib)"
                location:
                  type: object
                  required: [lat, lng]
                  properties:
                    lat:
                      type: number
                      format: float
                      example: -6.1234
                      description: "GPS latitude coordinates"
                    lng:
                      type: number
                      format: float
                      example: 106.5678
                      description: "GPS longitude coordinates"
                  description: "Koordinat GPS saat SOS dikirim"
                jenisEmergency:
                  type: string
                  enum: ["SOS", "Medical Emergency", "Engine Failure", "Fire", "Collision", "Man Overboard", "Other"]
                  example: "SOS"
                  description: "Jenis emergency (opsional, default: SOS)"
                note:
                  type: string
                  example: "Mesin kapal rusak, butuh bantuan segera"
                  maxLength: 500
                  description: "Catatan tambahan dari pengirim (opsional)"
                priority:
                  type: string
                  enum: ["low", "medium", "high", "critical"]
                  example: "critical"
                  description: "Tingkat prioritas emergency (opsional, default: high)"
      responses:
        '201':
          description: "🚨 SOS alert berhasil dikirim dan akan muncul di live monitoring"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "SOS berhasil dikirim! Tim rescue akan segera dihubungi."
                  data:
                    type: object
                    properties:
                      sosId:
                        type: integer
                        example: 15
                        description: "ID SOS alert yang baru dibuat"
                      kapalId:
                        type: integer
                        example: 1
                      vesselName:
                        type: string
                        example: "KM Mina Jaya"
                      location:
                        type: object
                        properties:
                          lat:
                            type: number
                            example: -6.1234
                          lng:
                            type: number
                            example: 106.5678
                      jenisEmergency:
                        type: string
                        example: "SOS"
                      status:
                        type: string
                        example: "aktif"
                        description: "Status SOS (aktif = baru dikirim)"
                      waktuLapor:
                        type: string
                        format: date-time
                        example: "2025-01-18T16:30:00Z"
                        description: "Timestamp SOS dikirim"
                      estimatedResponse:
                        type: string
                        example: "Tim rescue akan menghubungi dalam 5-10 menit"
                        description: "Estimasi waktu response"
        '400':
          description: "Validation error - data tidak lengkap"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Data tidak lengkap"
                  errors:
                    type: array
                    items:
                      type: string
                    example: ["kapalId wajib diisi", "koordinat GPS tidak valid"]
        '403':
          description: "Access denied - hanya nahkoda/ABK yang bisa kirim SOS"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Hanya nahkoda dan ABK yang dapat mengirim SOS"
        '404':
          description: "Kapal tidak ditemukan atau user tidak assigned ke kapal"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Kapal tidak ditemukan atau Anda tidak memiliki akses ke kapal ini"
        '500':
          description: "Server error - SOS gagal dikirim"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Gagal mengirim SOS, silakan coba lagi"
                  error:
                    type: string
                    example: "Database connection failed"

