name: CD - Build & Release APK

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version name (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.8"
          channel: "stable"
          cache: true

      - name: Setup .env
        run: |
          echo "API_BASE_URL=http://192.168.1.18:5000/api" > .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GEMINI_MODEL=gemini-2.5-flash" >> .env
          echo "GEMINI_BASE_URL=https://generativelanguage.googleapis.com/v1beta" >> .env
          echo "GOOGLE_MAPS_API_KEY=dummy_maps_key" >> .env
          echo "OPENWEATHER_API_KEY=dummy_weather_key" >> .env

      - name: Setup google-services.json
        run: |
          cat > android/app/google-services.json << 'GSJSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy-ci",
              "storage_bucket": "dummy-ci.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": { "package_name": "com.example.e_logbook" }
              },
              "oauth_client": [],
              "api_key": [{ "current_key": "dummy" }],
              "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
            }],
            "configuration_version": "1"
          }
          GSJSON

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          cat android/local.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "code=${{ github.run_number }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "code=${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Build APK
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }}

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/e-logbook-v${{ steps.version.outputs.name }}.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: e-logbook-v${{ steps.version.outputs.name }}
          path: build/app/outputs/flutter-apk/e-logbook-v${{ steps.version.outputs.name }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          name: E-Logbook v${{ steps.version.outputs.name }}
          files: build/app/outputs/flutter-apk/e-logbook-v${{ steps.version.outputs.name }}.apk
          body: |
            ## 📱 E-Logbook v${{ steps.version.outputs.name }}

            ### 📥 Download
            Download APK di bawah dan install di Android (min. Android 5.0)

            ### 📋 Cara Install
            1. Download file `.apk`
            2. Buka file di HP Android
            3. Izinkan install dari sumber tidak dikenal jika diminta
            4. Install dan buka aplikasi
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
