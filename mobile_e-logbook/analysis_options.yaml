# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Treat these as warnings instead of info
    unused_local_variable: warning
    unused_element: warning
    # Ignore these for now (can be fixed gradually)
    use_build_context_synchronously: info
    deprecated_member_use: ignore  # withOpacity → withValues (Flutter 3.24+)
    undefined_lint: ignore
    asset_does_not_exist: ignore  # .env file is in .gitignore (security)
    
linter:
  rules:
    # Enabled rules
    avoid_print: false  # Allow print for debugging
    
    # Disabled rules (non-critical, can be fixed gradually)
    use_super_parameters: false
    no_leading_underscores_for_local_identifiers: false
    unnecessary_brace_in_string_interps: false
    unnecessary_to_list_in_spreads: false
    prefer_conditional_assignment: false
    # unnecessary_import: false  # Removed - not recognized
    unnecessary_const: false
    prefer_final_fields: false
    empty_catches: false
    constant_identifier_names: false
    prefer_interpolation_to_compose_strings: false
    curly_braces_in_flow_control_structures: false
    use_key_in_widget_constructors: false
    library_private_types_in_public_api: false
    annotate_overrides: false
    sized_box_for_whitespace: false

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
